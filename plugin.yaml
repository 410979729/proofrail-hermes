name: proofrail
version: v0.0.9
description: LoopCraft loop engineering runtime for Hermes; installed as proofrail for compatibility, with evidence-first execution, verification guidance, non-blocking workflow risk hints, and optional LLM gray-area classification.
author: Yuheng
provides_hooks:
  - on_session_start
  - pre_tool_call
  - post_tool_call
  - transform_tool_result
  - pre_llm_call
  - on_session_end
  - on_session_finalize
