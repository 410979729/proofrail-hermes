name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install pytest pyyaml build
      - run: python -m py_compile __init__.py proofrail/*.py scripts/check.release.py scripts/verify.package.py scripts/phase6.live.smoke.py
      - run: |
          pytest -q \
            tests/test_proofrail.py \
            tests/test_readback_validation_regression.py \
            tests/test_cooperative_modes.py \
            tests/test_classifier_fallback.py \
            tests/test_classifier_mode_mapping.py \
            tests/test_phase4_audit_and_wording.py \
            tests/test_phase5_mode_lifecycle.py \
            tests/test_phase6_behavior_simulation.py
      - run: rm -rf __pycache__ proofrail/__pycache__ tests/__pycache__ scripts/__pycache__ .pytest_cache
      - run: python scripts/check.release.py
      - run: python -m build --wheel
      - run: python scripts/verify.package.py
      - run: PYTHONPATH=. python scripts/phase6.live.smoke.py
      - run: rm -rf __pycache__ proofrail/__pycache__ tests/__pycache__ scripts/__pycache__ build dist *.egg-info .pytest_cache
      - run: python scripts/check.release.py
